    <script type="module">
        const loaderOverlay = document.getElementById('loader-overlay');

        function getGroupBadgeHTML(gruppo) {
            if (!gruppo) return '';
            let bgColor = 'bg-slate-600';
            let textColor = 'text-slate-200';
            switch (gruppo) {
                case 'Squadra olimpica': bgColor = 'bg-sky-500'; textColor = 'text-white'; break;
                case 'Under 23': bgColor = 'bg-teal-500'; textColor = 'text-white'; break;
                case 'Under 19': bgColor = 'bg-orange-500'; textColor = 'text-white'; break;
                case 'ParaRowing': bgColor = 'bg-purple-500'; textColor = 'text-white'; break;
                case 'Beach sprint': bgColor = 'bg-amber-500'; textColor = 'text-white'; break;
            }
            return `<span class="inline-block px-3 py-1 rounded-full font-semibold text-xs ${bgColor} ${textColor}">${gruppo}</span>`;
        }

        function displayAthleteInfo(athlete) {
            if (athlete) {
                const fullName = `${athlete.cognome || ''} ${athlete.nome || ''}`;
                document.getElementById('profile-cognome').textContent = fullName.trim() || 'Atleta';
                document.getElementById('profile-societa').textContent = athlete.societa || 'Nessuna società';

                const badgeContainer = document.getElementById('profile-gruppo-badge');
                if (athlete.gruppo) {
                    badgeContainer.innerHTML = getGroupBadgeHTML(athlete.gruppo);
                } else {
                    badgeContainer.innerHTML = '';
                }

                const valRow = athlete.rowerg || athlete.pb_2000 || '--:--';
                const valBike = athlete.bikeerg || athlete.pb_6000 || '--:--';

                document.getElementById('profile-pb-row').textContent = valRow;
                document.getElementById('profile-pb-bike').textContent = valBike;
            }
        }

        // Ascolta l'evento 'authStateReady' inviato da auth-manager.js (versione Atleta)
        document.addEventListener('authStateReady', (e) => {
            const { athlete, error } = e.detail;

            if (athlete) {
                displayAthleteInfo(athlete);
                loaderOverlay.style.display = 'none';
                document.body.style.visibility = 'visible';
            } else {
                console.log("Utente non loggato o errore, redirect in corso...");
            }
        });

        // Logica Sidebar
        const menuBtn = document.getElementById('menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarBackdrop = document.getElementById('sidebar-backdrop');
        const sidebarLogoutBtn = document.getElementById('sidebar-logout-btn');

        function toggleSidebar() {
            const isClosed = sidebar.classList.contains('translate-x-full');
            if (isClosed) {
                sidebar.classList.remove('translate-x-full');
                sidebarBackdrop.classList.remove('hidden');
            } else {
                sidebar.classList.add('translate-x-full');
                sidebarBackdrop.classList.add('hidden');
            }
        }

        menuBtn.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarBackdrop.addEventListener('click', toggleSidebar);

        sidebarLogoutBtn.addEventListener('click', () => {
            if (window.appLogout) {
                window.appLogout();
            } else {
                console.error("Funzione appLogout() non trovata.");
            }
        });
    </script>
